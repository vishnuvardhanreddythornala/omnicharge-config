server.port=8081
spring.application.name=user-service

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/omnicharge_user_db
spring.datasource.username=postgres
spring.datasource.password=Login@630
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379

# JWT Configuration
jwt.secret=${JWT_SECRET:omnicharge-super-secret-key-for-jwt-token-generation-minimum-256-bits}
jwt.access-token-expiration=1800000
jwt.refresh-token-expiration=604800000

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Mail (keep placeholders for now)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:snippetone@gmail.com}
spring.mail.password=${MAIL_APP_PASSWORD:Login@630}
google.client-id=${GOOGLE_CLIENT_ID:dummy-client-id}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.mail.enabled=false

# Logging
logging.level.com.omnicharge.user=DEBUG
logging.level.org.springframework.security=DEBUG
